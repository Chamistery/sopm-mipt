# Production-style bring-up for the СУПП ВШПИ МФТИ system.
#
# Single entry point: `docker compose up -d --build` (or `make up`) gives you
# postgres + Go project-service + nginx-served React SPA on http://localhost:8080.
#
# The legacy backend/project-service/docker-compose.yml is intentionally
# preserved as a backend-only dev convenience.

services:
  postgres:
    image: postgres:16-alpine
    container_name: sopm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sopm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # На init контейнер запустит /docker-entrypoint-initdb.d/*.sh|*.sql.
      # Мы монтируем миграции в /migrations и init-скрипт, который
      # применяет только *.up.sql (см. scripts/postgres-init-migrations.sh):
      # это исключает .down.sql, которые иначе бы выполнялись раньше .up
      # по алфавиту и ломали свежие сборки.
      - ./backend/project-service/migrations:/migrations:ro
      - ./scripts/postgres-init-migrations.sh:/docker-entrypoint-initdb.d/01-migrations.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sopm}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  project-service:
    build:
      context: backend/project-service
      dockerfile: Dockerfile
    container_name: sopm-project-service
    environment:
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-sopm}
      DB_SSLMODE: disable
      STORAGE_DIR: /app/storage
      MAX_APPLICATION_CHOICES: "5"
      MAX_UPLOAD_BYTES: "10485760"
      # Перенаправление /api/distribution/generate на C++ Гейля-Шепли.
      # Если переменная пустая или сервис недоступен — fallback на
      # встроенный наивный алгоритм / 503 соответственно.
      DISTRIBUTION_SERVICE_URL: http://distribution-service:8090
      REPORT_SERVICE_URL: http://report-service:8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
    expose:
      - "8080"
    volumes:
      - project_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  distribution-service:
    build:
      context: backend/distribution_service
      dockerfile: Dockerfile
    container_name: sopm-distribution-service
    environment:
      # C++ сервис ходит назад в project-service за заявками/проектами/
      # пользователями, и шлёт internal-service-token для прохода через
      # middleware/auth.AuthContextWithServiceToken.
      DIST_SERVICE_http_port: "8090"
      DIST_SERVICE_projects_service_url: http://project-service:8080
      DIST_SERVICE_users_service_url: http://project-service:8080
      DIST_SERVICE_applications_service_url: http://project-service:8080
      DIST_SERVICE_internal_service_token: ${INTERNAL_SERVICE_TOKEN:-}
      DIST_SERVICE_log_level: INFO
    expose:
      - "8090"
    depends_on:
      - project-service
    restart: unless-stopped

  report-service:
    build:
      context: backend/report_service
      dockerfile: Dockerfile
    container_name: sopm-report-service
    expose:
      - "8091"
    restart: unless-stopped

  web:
    build:
      # Repo root — the frontend Dockerfile copies both frontend/web and
      # backend/project-service/swagger.yaml (needed by `npm run gen:api`).
      context: .
      dockerfile: frontend/web/Dockerfile
    container_name: sopm-web
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - project-service
    restart: unless-stopped

volumes:
  postgres_data:
  project_storage:
