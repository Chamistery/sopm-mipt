<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СУПП ВШПИ — Администрирование</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-sub">ВШПИ МФТИ</div>
      <div class="sidebar-logo-main">Система управления<br>проектным практикумом</div>
    </div>
    <div class="role-switcher-wrap">
      <div class="role-switcher-label">Тестовый режим — роль</div>
      <select class="role-switcher" onchange="switchRole(this.value)">
        <!-- filled by JS -->
      </select>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-nav-item active" data-nav="main" onclick="showView('main')">
        <svg width="20" height="20" fill="none" viewBox="0 0 20 20"><path d="M10 2l7 4v8l-7 4-7-4V6l7-4z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 10v8M10 10l7-4M10 10L3 6" stroke="currentColor" stroke-width="1.4"/></svg>
        Администрирование
      </button>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar"><svg width="20" height="20" fill="none" viewBox="0 0 20 20" style="color:rgba(255,255,255,0.7)"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 18c0-3.5 3.1-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="1.4"/></svg></div>
      <div><div class="sidebar-user-name">Иванов И.И.</div><div class="sidebar-user-role">Администратор</div></div>
    </div>
  </aside>

  <main class="main">
    <div id="view-main" class="view active">
      <div class="placeholder-page">
        <div class="placeholder-icon">
          <svg width="40" height="40" fill="none" viewBox="0 0 40 40"><path d="M20 4l14 8v16l-14 8-14-8V12l14-8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M20 20v16M20 20l14-8M20 20L6 12" stroke="currentColor" stroke-width="2"/></svg>
        </div>
        <div class="placeholder-title">Панель администратора</div>
        <div class="placeholder-text">Этот интерфейс находится в разработке. Здесь будут доступны инструменты управления пользователями, проектами и настройками системы.</div>
      </div>
    </div>
  </main>

  <script src="common.js"></script>
  <script>
document.querySelector('.role-switcher').innerHTML = roleSwitcherHtml('admin');
  </script>
</body>
</html>
