# nginx config for the СУПП ВШПИ frontend container.
#
# Responsibilities:
#   * serve the Vite-built SPA from /usr/share/nginx/html
#   * SPA fallback (history API): unknown paths → /index.html
#   * proxy /api/ and /health to the Go service (project-service:8080)
#   * long-cache hashed assets, no-cache index.html
#   * gzip text payloads

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # ---- gzip --------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ---- rate limits (mirrors backend/project-service/nginx.conf) ----------
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=read_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream backend {
        server project-service:8080;
    }

    server {
        listen 80;
        server_name _;

        # Security headers.
        add_header X-Frame-Options        "SAMEORIGIN"               always;
        add_header X-Content-Type-Options "nosniff"                  always;
        add_header X-XSS-Protection       "1; mode=block"            always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        limit_conn conn_limit 20;

        # File uploads in profiles can reach MAX_UPLOAD_BYTES (10 MiB on the
        # backend) — give a small headroom for multipart overhead.
        client_max_body_size 12m;
        client_body_timeout  30s;
        client_header_timeout 10s;
        send_timeout         30s;

        root /usr/share/nginx/html;
        index index.html;

        # ---- backend health probe ------------------------------------------
        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ---- API proxy -----------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---- static assets (long cache, hashed by Vite) --------------------
        location /assets/ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Catch-all for top-level static files Vite emits with hashes
        # (e.g. .js/.css/.woff2/icons/etc).
        location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|ico|png|jpe?g|gif|svg|webp|avif|map|wasm)$ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ---- SPA entry point ----------------------------------------------
        # Never cache the HTML shell — it references hashed assets above.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma        "no-cache" always;
            expires 0;
        }

        # SPA history fallback. Anything not matched above resolves to the
        # client-side router.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- error pages ---------------------------------------------------
        error_page 429 @rate_limit_error;
        location @rate_limit_error {
            default_type application/json;
            return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded. Please try again later."}';
        }

        error_page 502 503 504 @upstream_error;
        location @upstream_error {
            default_type application/json;
            return 502 '{"error": "Bad Gateway", "message": "Upstream service is unavailable."}';
        }
    }
}
