services:
  postgres:
    image: postgres:16-alpine
    container_name: sopm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sopm
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  project-service:
    build: .
    container_name: sopm-project-service
    environment:
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sopm
      DB_SSLMODE: disable
      STORAGE_DIR: /app/storage
      MAX_APPLICATION_CHOICES: "5"
      MAX_UPLOAD_BYTES: "10485760"
    expose:
      - "8080"
    volumes:
      - project_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: sopm-nginx
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - project-service
    restart: unless-stopped

volumes:
  postgres_data:
  project_storage:
