openapi: 3.0.3
info:
  title: SOPM Project Service API
  version: 2.0.0
  description: "API для полного цикла проектной работы: проекты, команды, спринты, задачи, отчёты, встречи, профили, файлы, уведомления и распределение."

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
  - name: Projects
  - name: Applications
  - name: Teams
  - name: Sprints
  - name: Tasks
  - name: TeamReports
  - name: SprintScores
  - name: Meetings
  - name: Users
  - name: Distribution

paths:
  /health:
    get:
      tags: [Health]
      summary: Проверка состояния сервиса
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /api/projects:
    get:
      tags: [Projects]
      summary: Получить список проектов
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: company
          schema: { type: string }
        - in: query
          name: course
          schema: { type: string }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ProjectStatus' }
        - in: query
          name: mentorId
          description: Фильтр по идентификатору ментора
          schema: { type: integer }
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
    post:
      tags: [Projects]
      summary: Создать проект
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
      responses:
        '201':
          description: Created

  /api/projects/{id}:
    get:
      tags: [Projects]
      summary: Получить проект
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200': { description: Project found }
    put:
      tags: [Projects]
      summary: Обновить проект
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
      responses:
        '200': { description: Updated }
    delete:
      tags: [Projects]
      summary: Удалить проект
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204': { description: Deleted }

  /api/projects/{id}/full:
    get:
      tags: [Projects]
      summary: Проект со спринтами и командами
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Expanded project

  /api/projects/{id}/applicants:
    get:
      tags: [Projects]
      summary: Все заявки на проект с группировкой по требованиям и приоритетам
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project applicants

  /api/projects/{id}/predecessor:
    get:
      tags: [Projects]
      summary: Проект-предшественник
      description: |
        Возвращает проект, на который ссылается `predecessorProjectId` указанного проекта.
        Если предшественник не задан, возвращается `200` с `data: null`.
        Если самого проекта не существует — `404`.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Предшественник найден или отсутствует (data может быть null)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true
                    oneOf:
                      - $ref: '#/components/schemas/Project'
                      - type: 'null'
        '401': { description: Требуется аутентификация }
        '404': { description: Проект не найден }

  /api/mentor/projects/archive:
    get:
      tags: [Projects]
      summary: Архив завершённых проектов ментора
      description: |
        Возвращает завершённые проекты текущего ментора (роль `mentor`,
        идентификатор берётся из контекста через `X-User-Id`).
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Список завершённых проектов ментора
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '403': { description: Доступ только для ментора }

  /api/applications:
    post:
      tags: [Applications]
      summary: Создать заявку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Application'
      responses:
        '201': { description: Created }
    get:
      tags: [Applications]
      summary: Получить заявки студента
      parameters:
        - in: query
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Student applications }

  /api/applications/project:
    get:
      tags: [Applications]
      summary: Получить заявки на проект
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Project applications }

  /api/applications/{id}:
    get:
      tags: [Applications]
      summary: Получить заявку
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200': { description: Application found }
    delete:
      tags: [Applications]
      summary: Удалить заявку
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '204': { description: Deleted }

  /api/applications/{id}/recommend:
    put:
      tags: [Applications]
      summary: Рекомендовать в команду
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId]
              properties:
                teamId: { type: integer }
      responses:
        '200': { description: Updated }

  /api/applications/{id}/unrecommend:
    put:
      tags: [Applications]
      summary: Убрать из команды
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200': { description: Updated }

  /api/applications/{id}/invite:
    put:
      tags: [Applications]
      summary: Пригласить студента
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200': { description: Updated }

  /api/applications/{id}/accept:
    put:
      tags: [Applications]
      summary: Принять приглашение
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200': { description: Updated }

  /api/applications/{id}/decline:
    put:
      tags: [Applications]
      summary: Отклонить приглашение
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200': { description: Updated }

  /api/applications/{id}/exclude:
    put:
      tags: [Applications]
      summary: Исключить из проекта
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200': { description: Updated }

  /api/teams:
    post:
      tags: [Teams]
      summary: Создать команду
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Team'
      responses:
        '201': { description: Created }
    get:
      tags: [Teams]
      summary: Список команд проекта
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Teams list }

  /api/teams/{id}:
    get:
      tags: [Teams]
      summary: Детали команды
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200': { description: Team found }
    put:
      tags: [Teams]
      summary: Обновить команду
      parameters:
        - $ref: '#/components/parameters/TeamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Team'
      responses:
        '200': { description: Updated }
    delete:
      tags: [Teams]
      summary: Удалить команду
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '204': { description: Deleted }

  /api/teams/{id}/members:
    post:
      tags: [Teams]
      summary: Добавить участника
      parameters:
        - $ref: '#/components/parameters/TeamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMember'
      responses:
        '201': { description: Created }

  /api/teams/{teamId}/members/{userId}:
    delete:
      tags: [Teams]
      summary: Удалить участника
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204': { description: Deleted }

  /api/teams/{id}/gantt:
    get:
      tags: [Tasks]
      summary: Получить данные для диаграммы Ганта
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - in: query
          name: sprintId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Gantt data }

  /api/sprints:
    post:
      tags: [Sprints]
      summary: Создать спринт
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Sprint'
      responses:
        '201': { description: Created }
    get:
      tags: [Sprints]
      summary: Список спринтов проекта
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Sprint list }

  /api/sprints/batch:
    post:
      tags: [Sprints]
      summary: Batch-создание спринтов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, sprints]
              properties:
                projectId: { type: integer }
                sprints:
                  type: array
                  items:
                    $ref: '#/components/schemas/Sprint'
      responses:
        '201': { description: Created }

  /api/sprints/{id}:
    get:
      tags: [Sprints]
      summary: Получить спринт
      parameters:
        - $ref: '#/components/parameters/SprintId'
      responses:
        '200': { description: Sprint found }
    put:
      tags: [Sprints]
      summary: Обновить спринт
      parameters:
        - $ref: '#/components/parameters/SprintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Sprint'
      responses:
        '200': { description: Updated }

  /api/tasks:
    post:
      tags: [Tasks]
      summary: Создать задачу
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        '201': { description: Created }
    get:
      tags: [Tasks]
      summary: Получить задачи
      parameters:
        - in: query
          name: sprintId
          schema: { type: integer }
        - in: query
          name: teamId
          schema: { type: integer }
        - in: query
          name: assigneeId
          schema: { type: integer }
      responses:
        '200': { description: Task list }

  /api/tasks/{id}:
    get:
      tags: [Tasks]
      summary: Получить задачу
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200': { description: Task found }
    put:
      tags: [Tasks]
      summary: Обновить задачу
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        '200': { description: Updated }
    delete:
      tags: [Tasks]
      summary: Отменить задачу
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '204': { description: Deleted }

  /api/tasks/{id}/approve:
    put:
      tags: [Tasks]
      summary: Аппрув задачи
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentPayload' }
      responses:
        '200': { description: Updated }

  /api/tasks/{id}/reject:
    put:
      tags: [Tasks]
      summary: Отклонить задачу
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentPayload' }
      responses:
        '200': { description: Updated }

  /api/tasks/{id}/submit-review:
    put:
      tags: [Tasks]
      summary: Отправить задачу на ревью
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200': { description: Updated }

  /api/tasks/{id}/accept:
    put:
      tags: [Tasks]
      summary: Принять задачу
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentPayload' }
      responses:
        '200': { description: Updated }

  /api/tasks/{id}/return:
    put:
      tags: [Tasks]
      summary: Вернуть задачу
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentPayload' }
      responses:
        '200': { description: Updated }

  /api/team-reports:
    post:
      tags: [TeamReports]
      summary: Создать отчёт
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamReport'
      responses:
        '201': { description: Created }
    get:
      tags: [TeamReports]
      summary: Получить отчёты команды
      parameters:
        - in: query
          name: teamId
          required: true
          schema: { type: integer }
        - in: query
          name: sprintId
          schema: { type: integer }
      responses:
        '200': { description: Reports list }

  /api/team-reports/{id}:
    put:
      tags: [TeamReports]
      summary: Обновить отчёт
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamReport'
      responses:
        '200': { description: Updated }

  /api/team-reports/{id}/review:
    put:
      tags: [TeamReports]
      summary: Проверить отчёт
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewPayload' }
      responses:
        '200': { description: Updated }

  /api/sprint-scores:
    post:
      tags: [SprintScores]
      summary: Поставить оценку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SprintScore'
      responses:
        '201': { description: Created }
    get:
      tags: [SprintScores]
      summary: Получить оценки
      parameters:
        - in: query
          name: sprintId
          schema: { type: integer }
        - in: query
          name: teamId
          schema: { type: integer }
        - in: query
          name: studentId
          schema: { type: integer }
      responses:
        '200': { description: Scores list }

  /api/sprint-scores/{id}:
    put:
      tags: [SprintScores]
      summary: Изменить оценку
      parameters:
        - $ref: '#/components/parameters/ScoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SprintScore'
      responses:
        '200': { description: Updated }

  /api/meetings:
    post:
      tags: [Meetings]
      summary: Создать встречу
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Meeting'
      responses:
        '201': { description: Created }
    get:
      tags: [Meetings]
      summary: Список встреч команды
      parameters:
        - in: query
          name: teamId
          required: true
          schema: { type: integer }
        - in: query
          name: upcoming
          schema: { type: boolean }
      responses:
        '200': { description: Meetings list }

  /api/meetings/{id}:
    put:
      tags: [Meetings]
      summary: Обновить встречу
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Meeting'
      responses:
        '200': { description: Updated }
    delete:
      tags: [Meetings]
      summary: Удалить встречу
      parameters:
        - $ref: '#/components/parameters/MeetingId'
      responses:
        '204': { description: Deleted }

  /api/users:
    post:
      tags: [Users]
      summary: Создать пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201': { description: Created }
    get:
      tags: [Users]
      summary: Получить список пользователей
      responses:
        '200': { description: Users list }

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Получить пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: User found }

  /api/users/{id}/team:
    get:
      tags: [Users]
      summary: Получить текущую команду пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: Team found }

  /api/users/{id}/profile:
    get:
      tags: [Users]
      summary: Получить расширенный профиль
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: Profile found }
    put:
      tags: [Users]
      summary: Обновить расширенный профиль
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
      responses:
        '200': { description: Updated }

  /api/users/{id}/files:
    post:
      tags: [Users]
      summary: Загрузить файл пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201': { description: Uploaded }
    get:
      tags: [Users]
      summary: Получить файлы пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: Files list }

  /api/users/{id}/files/{fileId}:
    delete:
      tags: [Users]
      summary: Удалить файл пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/FileId'
      responses:
        '204': { description: Deleted }

  /api/users/{id}/notifications:
    get:
      tags: [Users]
      summary: Получить уведомления пользователя
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: Notification list }

  /api/distribution/generate:
    post:
      tags: [Distribution]
      summary: Запустить черновое распределение
      responses:
        '200': { description: Started }

  /api/distribution/status:
    get:
      tags: [Distribution]
      summary: Получить статус распределения
      responses:
        '200': { description: Current status }

components:
  parameters:
    ProjectId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    ApplicationId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    TeamId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    TeamIdPath:
      in: path
      name: teamId
      required: true
      schema: { type: integer }
    UserId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    UserIdPath:
      in: path
      name: userId
      required: true
      schema: { type: integer }
    SprintId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    TaskId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    ReportId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    ScoreId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    MeetingId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    FileId:
      in: path
      name: fileId
      required: true
      schema: { type: integer }
  schemas:
    Envelope:
      type: object
      properties:
        data:
          nullable: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    ProjectStatus:
      type: string
      enum: [Черновик, Опубликован, Активный, Завершён, Архивный]
    ApplicationStatus:
      type: string
      enum: [Ожидает, Не подходит, Не рекомендован, Рекомендован, Принято ментором, Принят, Студент отклонил, Авто-отклонено, Исключён]
    SprintStatus:
      type: string
      enum: [Запланирован, Активный, Завершён]
    TaskStatus:
      type: string
      enum: [Ожидает аппрува, Назначена, Отклонена, В работе, На ревью, Возвращена, Готово]
    TeamReportStatus:
      type: string
      enum: [Черновик, Отправлен, Проверен]
    MeetingStatus:
      type: string
      enum: [Ожидает подтверждения, Подтверждена, Отклонена, Состоялась, Отменена]
    User:
      type: object
      properties:
        id: { type: integer }
        firstName: { type: string }
        lastName: { type: string }
        middleName: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        company: { type: string }
        course: { type: string }
        group: { type: string }
        avatar: { type: string }
        gpa: { type: number }
        direction: { type: string }
    TeamMember:
      type: object
      properties:
        id: { type: integer }
        teamId: { type: integer }
