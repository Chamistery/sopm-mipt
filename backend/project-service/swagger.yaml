openapi: 3.0.3
info:
  title: SOPM Project Service API
  version: 2.1.0
  description: |
    API для системы управления проектным практикумом ВШПИ МФТИ.
    Покрывает полный цикл: проекты, команды, спринты, задачи, отчёты, встречи, профили, файлы, уведомления и распределение.

    **Авторизация (dev-режим):** передавайте `X-User-Id` и `X-User-Role` в заголовках.

    **Формат ответа:** все успешные ответы обёрнуты в `{"data": ...}`, ошибки в `{"error": "..."}`.

servers:
  - url: http://localhost:8080
    description: Docker Compose (default)

tags:
  - name: Health
  - name: Projects
  - name: Applications
  - name: Teams
  - name: Sprints
  - name: Tasks
  - name: TeamReports
  - name: SprintScores
  - name: Meetings
  - name: Users
  - name: Distribution

paths:
  /health:
    get:
      tags: [Health]
      summary: Проверка состояния сервиса
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /api/projects:
    get:
      tags: [Projects]
      summary: Список проектов (с фильтрацией и пагинацией)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: company
          schema: { type: string }
        - in: query
          name: course
          schema: { type: string }
          description: Фильтр по курсу (число)
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ProjectStatus' }
      responses:
        '200':
          description: Paginated project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      projects:
                        type: array
                        items: { $ref: '#/components/schemas/ProjectListItem' }
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }
    post:
      tags: [Projects]
      summary: Создать проект
      description: "Роли: mentor, coordinator, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Project' }

  /api/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Projects]
      summary: Детали проекта
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Project' }
    put:
      tags: [Projects]
      summary: Обновить проект
      description: "Роли: mentor, coordinator, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectInput' }
      responses:
        '200':
          description: Updated
    delete:
      tags: [Projects]
      summary: Удалить проект
      description: "Роли: coordinator, admin"
      responses:
        '204': { description: Deleted }

  /api/projects/{id}/full:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Projects]
      summary: Проект + спринты + команды
      responses:
        '200':
          description: Expanded project
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProjectFull' }

  /api/projects/{id}/applicants:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Projects]
      summary: Все заявки с группировкой по приоритетам и требованиям
      description: "Роли: mentor, coordinator, admin"
      responses:
        '200':
          description: Applicants grouped
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ApplicantsResponse' }

  /api/applications:
    post:
      tags: [Applications]
      summary: Подать заявку на проект
      description: "Роли: student. Priority 1-5, все 5 обязательны."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, studentId, priority]
              properties:
                projectId: { type: integer }
                studentId: { type: integer }
                priority: { type: integer, minimum: 1, maximum: 5 }
      responses:
        '201': { description: Created }
    get:
      tags: [Applications]
      summary: Заявки студента
      parameters:
        - in: query
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Student applications }

  /api/applications/project:
    get:
      tags: [Applications]
      summary: Заявки на проект
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Project applications }

  /api/applications/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Applications]
      summary: Детали заявки
      responses:
        '200': { description: Application found }
    delete:
      tags: [Applications]
      summary: Удалить заявку
      responses:
        '204': { description: Deleted }

  /api/applications/{id}/recommend:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Applications]
      summary: Рекомендовать в команду
      description: "Роли: mentor. Переход: Ожидает/Не рекомендован/Не подходит → Рекомендован"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId]
              properties:
                teamId: { type: integer }
      responses:
        '200': { description: Updated }

  /api/applications/{id}/unrecommend:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Applications]
      summary: Убрать из команды
      description: "Роли: mentor. Переход: Рекомендован → Не рекомендован"
      responses:
        '200': { description: Updated }

  /api/applications/{id}/invite:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Applications]
      summary: Пригласить студента (ментор нажал ✓)
      description: "Роли: mentor. Переход: Рекомендован → Принято ментором"
      responses:
        '200': { description: Updated }

  /api/applications/{id}/accept:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Applications]
      summary: Студент принимает приглашение
      description: "Роли: student. Переход: Принято ментором → Принят. Каскадное отклонение остальных приглашений."
      responses:
        '200': { description: Updated }

  /api/applications/{id}/decline:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Applications]
      summary: Студент отклоняет приглашение (окончательно)
      description: "Роли: student. Переход: Принято ментором → Студент отклонил"
      responses:
        '200': { description: Updated }

  /api/applications/{id}/exclude:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Applications]
      summary: Исключить студента из проекта
      description: "Роли: coordinator, admin. Переход: Принят → Исключён. Также удаляет из team_members."
      responses:
        '200': { description: Updated }

  /api/teams:
    post:
      tags: [Teams]
      summary: Создать команду
      description: "Роли: coordinator, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, name]
              properties:
                projectId: { type: integer }
                name: { type: string }
                leaderId: { type: integer }
      responses:
        '201': { description: Created }
    get:
      tags: [Teams]
      summary: Команды проекта
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Teams list }

  /api/teams/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Teams]
      summary: Детали команды (с участниками и текущим спринтом)
      responses:
        '200':
          description: Team with members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Team' }
    put:
      tags: [Teams]
      summary: Обновить команду (сменить лидера)
      description: "Роли: coordinator, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                leaderId: { type: integer }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Teams]
      summary: Удалить команду
      description: "Роли: coordinator, admin"
      responses:
        '204': { description: Deleted }

  /api/teams/{id}/members:
    parameters:
      - $ref: '#/components/parameters/PathId'
    post:
      tags: [Teams]
      summary: Добавить участника
      description: "Роли: coordinator, mentor, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: integer }
                roleInTeam: { type: string }
      responses:
        '201': { description: Added }

  /api/teams/{teamId}/members/{userId}:
    parameters:
      - in: path
        name: teamId
        required: true
        schema: { type: integer }
      - in: path
        name: userId
        required: true
        schema: { type: integer }
    delete:
      tags: [Teams]
      summary: Удалить участника из команды
      description: "Роли: coordinator, mentor, admin"
      responses:
        '204': { description: Removed }

  /api/teams/{id}/gantt:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Teams]
      summary: Данные для диаграммы Ганта
      parameters:
        - in: query
          name: sprintId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Gantt data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/GanttResponse' }

  /api/sprints:
    post:
      tags: [Sprints]
      summary: Создать спринт
      description: "Роли: mentor, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SprintInput' }
      responses:
        '201': { description: Created }
    get:
      tags: [Sprints]
      summary: Спринты проекта
      parameters:
        - in: query
          name: projectId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Sprints list }

  /api/sprints/batch:
    post:
      tags: [Sprints]
      summary: Batch-создание спринтов
      description: "Роли: mentor, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, sprints]
              properties:
                projectId: { type: integer }
                sprints:
                  type: array
                  items: { $ref: '#/components/schemas/SprintInput' }
      responses:
        '201': { description: Created }

  /api/sprints/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Sprints]
      summary: Детали спринта
      responses:
        '200': { description: Sprint found }
    put:
      tags: [Sprints]
      summary: Обновить спринт
      description: "Роли: mentor, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SprintInput' }
      responses:
        '200': { description: Updated }

  /api/tasks:
    post:
      tags: [Tasks]
      summary: Создать задачу (статус → Ожидает аппрува)
      description: |
        Студент создаёт задачу только себе. Тимлид — любому в своей команде.
        Даты должны быть в пределах спринта.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskInput' }
      responses:
        '201': { description: Created }
    get:
      tags: [Tasks]
      summary: Список задач (фильтры)
      parameters:
        - in: query
          name: sprintId
          schema: { type: integer }
        - in: query
          name: teamId
          schema: { type: integer }
        - in: query
          name: assigneeId
          schema: { type: integer }
      responses:
        '200':
          description: Tasks list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      tasks:
                        type: array
                        items: { $ref: '#/components/schemas/Task' }

  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Tasks]
      summary: Детали задачи
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
    put:
      tags: [Tasks]
      summary: Обновить задачу
      description: |
        Ограничения по статусу:
        - Ожидает аппрува: name, description, hoursEstimate
        - Назначена: name, description, hoursEstimate (даты — только ментор)
        - В работе: workDescription, mrLink (даты — только ментор)
        - Возвращена: workDescription, mrLink
        - На ревью / Готово / Отклонена: нередактируема
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskInput' }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Tasks]
      summary: Отменить задачу (soft-delete, только до аппрува)
      description: "Только автор задачи может отменить, пока статус = Ожидает аппрува"
      responses:
        '204': { description: Deleted }

  /api/tasks/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Tasks]
      summary: Аппрувить задачу (→ Назначена)
      description: "Роли: mentor. Комментарий опционален."
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentPayload' }
      responses:
        '200': { description: Approved }

  /api/tasks/{id}/reject:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Tasks]
      summary: Отклонить задачу (→ Отклонена)
      description: "Роли: mentor. **Комментарий обязателен.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, minLength: 1 }
      responses:
        '200': { description: Rejected }
        '400': { description: Comment is required }

  /api/tasks/{id}/submit-review:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Tasks]
      summary: Отправить на ревью (→ На ревью)
      description: "Только assignee. Допустимые исходные статусы: В работе, Возвращена."
      responses:
        '200': { description: Submitted }

  /api/tasks/{id}/accept:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Tasks]
      summary: Принять задачу с ревью (→ Готово)
      description: "Роли: mentor. Комментарий опционален."
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentPayload' }
      responses:
        '200': { description: Accepted }

  /api/tasks/{id}/return:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Tasks]
      summary: Вернуть задачу на доработку (→ Возвращена)
      description: "Роли: mentor. **Комментарий обязателен.**"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string, minLength: 1 }
      responses:
        '200': { description: Returned }
        '400': { description: Comment is required }

  /api/team-reports:
    post:
      tags: [TeamReports]
      summary: Создать командный отчёт
      description: "Роли: teamlead, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamReportInput' }
      responses:
        '201': { description: Created }
    get:
      tags: [TeamReports]
      summary: Отчёты команды
      parameters:
        - in: query
          name: teamId
          required: true
          schema: { type: integer }
        - in: query
          name: sprintId
          schema: { type: integer }
          description: Если указан — вернёт один отчёт за конкретный спринт
      responses:
        '200': { description: Reports }

  /api/team-reports/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [TeamReports]
      summary: Обновить отчёт (черновик/отправить)
      description: "Роли: teamlead, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamReportInput' }
      responses:
        '200': { description: Updated }

  /api/team-reports/{id}/review:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [TeamReports]
      summary: Проверить отчёт (ментор)
      description: "Роли: mentor, admin. Ставит status=Проверен и mentorComment."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mentorComment: { type: string }
      responses:
        '200': { description: Reviewed }

  /api/sprint-scores:
    post:
      tags: [SprintScores]
      summary: Поставить оценку студенту за спринт
      description: "Роли: mentor, admin. Оценка 0-10."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SprintScoreInput' }
      responses:
        '201': { description: Created }
    get:
      tags: [SprintScores]
      summary: Оценки (по спринту+команде или по студенту)
      parameters:
        - in: query
          name: sprintId
          schema: { type: integer }
        - in: query
          name: teamId
          schema: { type: integer }
        - in: query
          name: studentId
          schema: { type: integer }
      responses:
        '200': { description: Scores list }

  /api/sprint-scores/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [SprintScores]
      summary: Изменить оценку
      description: "Роли: mentor, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                score: { type: integer, minimum: 0, maximum: 10 }
                comment: { type: string }
      responses:
        '200': { description: Updated }

  /api/meetings:
    post:
      tags: [Meetings]
      summary: Создать встречу
      description: |
        Роли: mentor, teamlead, admin.
        Если создаёт ментор — автоматически подтверждена.
        Если создаёт тимлид — статус "Ожидает подтверждения".
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MeetingInput' }
      responses:
        '201': { description: Created }
    get:
      tags: [Meetings]
      summary: Встречи команды
      parameters:
        - in: query
          name: teamId
          required: true
          schema: { type: integer }
        - in: query
          name: upcoming
          schema: { type: boolean }
          description: "true — только предстоящие (meeting_date >= today)"
      responses:
        '200': { description: Meetings list }

  /api/meetings/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    put:
      tags: [Meetings]
      summary: Обновить встречу (подтвердить/отклонить/добавить итоги)
      description: |
        Ментор может выставить mentorConfirmed=true/false.
        Тимлид может обновить описание, итоги.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MeetingInput' }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Meetings]
      summary: Удалить встречу
      description: "Только автор или admin"
      responses:
        '204': { description: Deleted }

  /api/users:
    post:
      tags: [Users]
      summary: Создать пользователя
      description: "Роли: coordinator, mentor, admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '201': { description: Created }
    get:
      tags: [Users]
      summary: Список всех пользователей
      responses:
        '200': { description: Users list }

  /api/users/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Users]
      summary: Детали пользователя
      responses:
        '200': { description: User found }

  /api/users/{id}/team:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Users]
      summary: Команда пользователя (текущий проект)
      responses:
        '200': { description: Team found }
        '404': { description: User not in any team }

  /api/users/{id}/profile:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Users]
      summary: Расширенный профиль
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserProfile' }
    put:
      tags: [Users]
      summary: Обновить профиль
      description: "Только свой или admin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserProfile' }
      responses:
        '200': { description: Updated }

  /api/users/{id}/files:
    parameters:
      - $ref: '#/components/parameters/PathId'
    post:
      tags: [Users]
      summary: Загрузить файл (только pdf/docx, max 10MB)
      description: "Только свой или admin"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserFile' }
    get:
      tags: [Users]
      summary: Список файлов пользователя
      responses:
        '200': { description: Files list }

  /api/users/{id}/files/{fileId}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - in: path
        name: fileId
        required: true
        schema: { type: integer }
    delete:
      tags: [Users]
      summary: Удалить файл
      description: "Только свой или admin"
      responses:
        '204': { description: Deleted }

  /api/users/{id}/notifications:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [Users]
      summary: Уведомления пользователя
      description: |
        Формируются на лету из таблиц tasks, applications, meetings, team_reports, projects.
        После запроса notifications_seen_at обновляется (уведомления помечаются прочитанными).
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Notification' }

  /api/distribution/generate:
    post:
      tags: [Distribution]
      summary: Запустить черновое распределение
      description: "Роли: coordinator, admin. Создаёт команды (если их меньше numTeams) и распределяет студентов."
      responses:
        '200':
          description: Started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status: { type: string, example: started }

  /api/distribution/status:
    get:
      tags: [Distribution]
      summary: Статус распределения
      responses:
        '200':
          description: Current status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/DistributionStatus' }

components:
  parameters:
    PathId:
      in: path
      name: id
      required: true
      schema: { type: integer }

  schemas:
    ProjectStatus:
      type: string
      enum: [Черновик, Опубликован, Активный, Завершён, Архивный]

    ApplicationStatus:
      type: string
      enum: [Ожидает, Не подходит, Не рекомендован, Рекомендован, Принято ментором, Принят, Студент отклонил, Авто-отклонено, Исключён]

    SprintStatus:
      type: string
      enum: [Запланирован, Активный, Завершён]

    TaskStatus:
      type: string
      enum: [Ожидает аппрува, Назначена, Отклонена, В работе, На ревью, Возвращена, Готово]

    TeamReportStatus:
      type: string
      enum: [Черновик, Отправлен, Проверен]

    MeetingStatus:
      type: string
      enum: [Ожидает подтверждения, Подтверждена, Отклонена, Состоялась, Отменена]

    Project:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        mentorId: { type: integer }
        company: { type: string }
        courses: { type: array, items: { type: integer } }
        description: { type: string }
        fullDescription: { type: string }
        technologies: { type: array, items: { type: string } }
        teamSizeMin: { type: integer }
        teamSizeMax: { type: integer }
        numTeams: { type: integer }
        minGpa: { type: number }
        eduResult: { type: string }
        acceptanceCriteria: { type: string }
        goal: { type: string }
        expectedResult: { type: string }
        competencies: { type: string }
        resources: { type: string }
        durationSemesters: { type: integer }
        submittedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProjectInput:
      type: object
      required: [title, mentorId]
      properties:
        title: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        mentorId: { type: integer }
        company: { type: string }
        courses: { type: array, items: { type: integer } }
        description: { type: string }
        fullDescription: { type: string }
        technologies: { type: array, items: { type: string } }
        teamSizeMin: { type: integer, default: 3 }
        teamSizeMax: { type: integer, default: 5 }
        numTeams: { type: integer, default: 1 }
        minGpa: { type: number }
        goal: { type: string }
        expectedResult: { type: string }
        competencies: { type: string }
        resources: { type: string }
        durationSemesters: { type: integer, default: 1 }

    ProjectListItem:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        mentorId: { type: integer }
        company: { type: string }
        courses: { type: array, items: { type: integer } }
        teamSizeMin: { type: integer }
        teamSizeMax: { type: integer }
        numTeams: { type: integer }
        filledTeams: { type: integer }
        acceptedCount: { type: integer }
        availableSlots: { type: integer }
        description: { type: string }
        technologies: { type: array, items: { type: string } }
        minGpa: { type: number }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProjectFull:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        sprints: { type: array, items: { $ref: '#/components/schemas/Sprint' } }
        teams: { type: array, items: { $ref: '#/components/schemas/Team' } }

    ApplicantsResponse:
      type: object
      properties:
        projectId: { type: integer }
        requirements:
          type: object
          properties:
            minCourse: { type: integer }
            minGpa: { type: number }
        qualified: { $ref: '#/components/schemas/PriorityBuckets' }
        unqualified: { $ref: '#/components/schemas/PriorityBuckets' }
        teams:
          type: array
          items:
            type: object
            properties:
              teamId: { type: integer }
              name: { type: string }
              maxSize: { type: integer }
              members: { type: array, items: { type: object } }

    PriorityBuckets:
      type: object
      properties:
        priority1: { type: array, items: { type: object } }
        priority2: { type: array, items: { type: object } }
        priority3: { type: array, items: { type: object } }
        priority4: { type: array, items: { type: object } }
        priority5: { type: array, items: { type: object } }

    Team:
      type: object
      properties:
        id: { type: integer }
        projectId: { type: integer }
        name: { type: string }
        leaderId: { type: integer, nullable: true }
        leader:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            firstName: { type: string }
            lastName: { type: string }
        members:
          type: array
          items: { $ref: '#/components/schemas/TeamMember' }
        currentSprint: { $ref: '#/components/schemas/Sprint' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TeamMember:
      type: object
      properties:
        id: { type: integer }
        teamId: { type: integer }
        userId: { type: integer }
        roleInTeam: { type: string }
        isLeader: { type: boolean }
        joinedAt: { type: string, format: date-time }
        user:
          type: object
          properties:
            id: { type: integer }
            firstName: { type: string }
            lastName: { type: string }

    Sprint:
      type: object
      properties:
        id: { type: integer }
        projectId: { type: integer }
        number: { type: integer }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { $ref: '#/components/schemas/SprintStatus' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SprintInput:
      type: object
      required: [number, startDate, endDate]
      properties:
        projectId: { type: integer }
        number: { type: integer }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { $ref: '#/components/schemas/SprintStatus' }

    Task:
      type: object
      properties:
        id: { type: integer }
        sprintId: { type: integer }
        teamId: { type: integer }
        assigneeId: { type: integer }
        assigneeName: { type: string }
        createdById: { type: integer }
        name: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/TaskStatus' }
        statusChangedAt: { type: string, format: date-time }
        wasOverdue: { type: boolean }
        hoursEstimate: { type: integer }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        mrLink: { type: string }
        workDescription: { type: string }
        mentorComments:
          type: array
          items: { $ref: '#/components/schemas/MentorComment' }
        history:
          type: array
          items: { $ref: '#/components/schemas/TaskHistoryItem' }
        deletedAt: { type: string, format: date-time, nullable: true }
        deletedById: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TaskInput:
      type: object
      required: [sprintId, teamId, assigneeId, name, startDate, endDate]
      properties:
        sprintId: { type: integer }
        teamId: { type: integer }
        assigneeId: { type: integer }
        name: { type: string }
        description: { type: string }
        hoursEstimate: { type: integer }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        mrLink: { type: string }
        workDescription: { type: string }

    MentorComment:
      type: object
      properties:
        action:
          type: string
          enum: [Аппрув, Отклонение, Принятие, Возврат]
        text: { type: string }
        createdAt: { type: string, format: date-time }

    TaskHistoryItem:
      type: object
      properties:
        day:
          type: integer
          description: "День от начала спринта"
        event:
          type: string
          enum: [review, returned, accepted]

    GanttResponse:
      type: object
      properties:
        sprint: { $ref: '#/components/schemas/Sprint' }
        members:
          type: array
          items:
            type: object
            properties:
              userId: { type: integer }
              name: { type: string }
              roleInTeam: { type: string }
              isLeader: { type: boolean }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/Task' }

    TeamReportInput:
      type: object
      required: [sprintId, teamId]
      properties:
        sprintId: { type: integer }
        teamId: { type: integer }
        summary: { type: string }
        problems: { type: string }
        nextPlan: { type: string }
        status: { $ref: '#/components/schemas/TeamReportStatus' }

    SprintScoreInput:
      type: object
      required: [sprintId, teamId, studentId, score]
      properties:
        sprintId: { type: integer }
        teamId: { type: integer }
        studentId: { type: integer }
        score: { type: integer, minimum: 0, maximum: 10 }
        comment: { type: string }

    MeetingInput:
      type: object
      required: [teamId, title, meetingDate, startTime]
      properties:
        teamId: { type: integer }
        sprintId: { type: integer }
        title: { type: string }
        description: { type: string }
        meetingDate: { type: string, format: date }
        startTime: { type: string, example: "16:00" }
        durationMinutes: { type: integer, default: 60 }
        conferenceLink: { type: string }
        mentorConfirmed: { type: boolean, nullable: true }
        mentorDeclineReason: { type: string }
        summary: { type: string }
        status: { $ref: '#/components/schemas/MeetingStatus' }

    UserInput:
      type: object
      required: [firstName, lastName, email, role]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        middleName: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [student, teamlead, mentor, coordinator, admin] }
        company: { type: string }
        course: { type: string }
        group: { type: string }
        gpa: { type: number }
        direction: { type: string }

    UserProfile:
      type: object
      properties:
        userId: { type: integer }
        telegram: { type: string }
        phone: { type: string }
        about: { type: string }
        skills: { type: array, items: { type: string } }
        links:
          type: array
          items:
            type: object
            properties:
              type: { type: string, example: GitHub }
              url: { type: string, format: uri }

    UserFile:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        fileName: { type: string }
        fileSize: { type: integer }
        fileType: { type: string, enum: [pdf, docx] }
        storagePath: { type: string }
        uploadedAt: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        code: { type: string, description: "Тип уведомления (например task_approved, meeting_scheduled)" }
        title: { type: string }
        message: { type: string }
        entity: { type: string, description: "Тип связанного объекта (task, application, meeting, team_report, project)" }
        entityId: { type: integer }
        createdAt: { type: string, format: date-time }

    DistributionStatus:
      type: object
      properties:
        state:
          type: string
          enum: [не начато, в процессе, завершено, ошибка]
        lastRunAt: { type: string, format: date-time }
        lastMessage: { type: string }

    CommentPayload:
      type: object
      properties:
        comment: { type: string }
